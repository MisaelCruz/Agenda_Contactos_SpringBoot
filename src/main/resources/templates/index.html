<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Lista de Contactos</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
	crossorigin="anonymous">
</head>
<body>

	<div th:if="${msgExito != null}" th:text="${msgExito}"></div>

	<h1>Lista de contactos</h1>
	<a href="/nuevo">Añadir contacto</a>

	<table>
		<thead>
			<tr>
				<th>ID</th>
				<th>Nombre</th>
				<th>Celular</th>
				<th>Email</th>
				<th>F.Nacimiento</th>
				<th>F.Registro</th>
			</tr>
		</thead>
		<tbody>
			<tr th:each="contacto : ${contactos}">
				<td th:text="${contacto.id}"></td>
				<td th:text="${contacto.nombre}"></td>
				<td th:text="${contacto.celular}"></td>
				<td th:text="${contacto.email}"></td>
				<td
					th:text="${#temporals.format(contacto.fechaNacimiento,'dd/MM/YYYY')}"></td>
				<td
					th:text="${#temporals.format(contacto.fechaRegistro,'dd/MM/YYYY hh:mm a')}"></td>
				<td>
				<a th:href="@{/{id}/editar(id=${contacto.id})}"> Editar</a>
				<a href="#" onclick="eliminarContacto(this)"> Eliminar</a>
				<form th:action="@{/{id}/eliminar(id=${contacto.id})}" method="post">
				</form>
				</td>
			</tr>
		</tbody>
	</table>
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
		crossorigin="anonymous"></script>
	<script>
	function eliminarContacto(elemento){
		var ok = confirm('¿Estas seguro de eliminar al contacto?');
		if(ok){
			elemento.nextElementSibling.submit();
		}
	}
	</script>
</body>
</html>
